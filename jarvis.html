<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>JARVIS-V4 · OPS-01 · DARKOPS MOBILE</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Jarvis V4">
  <meta name="theme-color" content="#000000">

  <style>
    :root {
      --color-bg: #000;
      --color-fg: #fff;
      --color-dark-element: #0a0a0a;
      --color-user-element: #111;
      --color-border-subtle: rgba(255, 255, 255, 0.08);
      --color-border-light: rgba(255, 255, 255, 0.2);
      --color-status-online: #00ff77;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--color-bg);
      color: var(--color-fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      height: 100%;
      overflow: hidden;
    }

    @supports (height: 100dvh) {
      body {
        height: 100dvh;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 4px;
    }

    header {
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border-subtle);
      display: flex;
      align-items: center;
      gap: 16px;
      height: 72px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.85);
    }

    header img {
      height: 54px;
      width: 54px;
      border-radius: 50%;
      background: var(--color-bg);
      border: 2px solid var(--color-fg);
      object-fit: cover;
    }

    header .unitBlock {
      display: flex;
      flex-direction: column;
    }

    header .unitMain {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header .unitSub {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 1.2px;
      margin-top: 2px;
      text-transform: uppercase;
    }

    #statusLED {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-status-online);
      box-shadow: 0 0 5px var(--color-status-online);
      vertical-align: middle;
      margin-left: 8px;
    }

    /* OPS-NAVIGATION */
    .ops-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 12px;
      background: #050505;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      height: 40px;
      box-sizing: border-box;
    }

    .ops-nav-btn {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #101010;
      color: #f5f5f5;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
    }

    .ops-nav-btn:hover {
      background: #1a1a1a;
    }

    #chat {
      position: absolute;
      top: calc(72px + 40px + env(safe-area-inset-top));
      bottom: calc(72px + env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      overflow-y: auto;
      padding: 16px;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 80%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: fade .25s ease;
    }

    .msg.jarvis {
      background: var(--color-dark-element);
      color: #e5e5e5;
    }

    .msg.user {
      margin-left: auto;
      background: var(--color-user-element);
      color: var(--color-fg);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #inputBox {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: var(--color-bg);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px 12px;
      background: var(--color-dark-element);
      border: 1px solid var(--color-border-light);
      color: var(--color-fg);
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      padding: 10px 16px;
      background: var(--color-fg);
      color: var(--color-bg);
      border: none;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 13px;
    }

    #typing {
      position: absolute;
      bottom: calc(58px + env(safe-area-inset-bottom));
      left: 18px;
      font-size: 12px;
      color: #777;
      opacity: 0.7;
      display: none;
    }

    @keyframes bootGlow {
      0% {
        opacity: 0;
        letter-spacing: -2px;
      }

      100% {
        opacity: 1;
        letter-spacing: 2px;
      }
    }

    .bootScreen {
      position: absolute;
      inset: 0;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-fg);
      font-size: 18px;
      font-weight: 700;
      animation: bootGlow 1s ease forwards;
      z-index: 999;
      text-align: center;
      padding: 0 20px;
    }
  </style>
</head>

<body>

  <div id="boot" class="bootScreen">
    JARVIS V4 · DARKOPS MOBILE<br>
    INITIALIZING OPS-01 CHANNEL
  </div>

  <header>
    <img src="assets/jarvis1.png" alt="Aichmayr Patch">
    <div class="unitBlock">
      <div class="unitMain">UNIT: JARVIS-V4 · CHANNEL: OPS-01</div>
      <div class="unitSub">Commander: Aichmayr <span id="statusLED"></span></div>
    </div>
  </header>

  <nav class="ops-nav">
    <button class="ops-nav-btn" onclick="location.href='index.html'">OPS Hub</button>
    <button class="ops-nav-btn" onclick="location.href='dashboard.html'">Dashboard</button>
    <button class="ops-nav-btn" onclick="location.href='jarvis.html'">Jarvis</button>
    <button class="ops-nav-btn" onclick="location.href='qr-suite.html'">QR Suite</button>
    <button class="ops-nav-btn" onclick="location.href='qr-linkhub.html'">LinkHub</button>
    <button class="ops-nav-btn" onclick="location.href='multi-social-qr.html'">Social QR</button>
    <button class="ops-nav-btn" onclick="location.href='smart-search-info.html'">Smart Search</button>
    <button class="ops-nav-btn" onclick="location.href='angebot.html'">Angebote</button>
    <button class="ops-nav-btn" onclick="location.href='rechnung.html'">Rechnungen</button>
    <button class="ops-nav-btn" onclick="location.href='mahnwesen.html'">Mahnwesen</button>
    <button class="ops-nav-btn" onclick="location.href='kundenanlegen.html'">Kunden</button>
    <button class="ops-nav-btn" onclick="location.href='lagerbestand.html'">Lager</button>
    <button class="ops-nav-btn" onclick="location.href='search.html'">Suche</button>
  </nav>


  <div id="chat"></div>
  <div id="typing">UNIT JARVIS-V4: Processing…</div>

  <div id="inputBox">
    <input id="input" placeholder="Awaiting next directive, Commander…">
    <button onclick="toggleVoice()" id="voiceBtn">Voice On</button>
    <button onclick="send()">Send</button>
  </div>

  <script>
    /* ==========================================================
       JARVIS V4.2 — KI-CORE ENGINE (MOBILE)
       ========================================================== */

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const typing = document.getElementById("typing");
    const bootScreen = document.getElementById("boot");

    /* Bootscreen ausblenden & Double-Tap-Zoom verhindern */
    setTimeout(() => {
      if (bootScreen) bootScreen.style.display = "none";
    }, 1100);

    let lastTouchEnd = 0;

    document.addEventListener("touchend", (event) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    /* ---------- UI-Helfer ---------- */
    function log(msg, sender = "jarvis") {
      if (!msg || !msg.trim()) return;
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.innerHTML = msg.replace(/\n/g, "<br>");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }


    /* ---------- VOICE OUTPUT ---------- */
    let voiceEnabled = true;

    function cleanSpeechText(msg) {
      return String(msg)
        .replace(/<br\s*\/?>/gi, ". ")
        .replace(/<[^>]*>/g, "")
        .replace(/DEBUG:.*$/gi, "")
        .replace(/UNIT:/gi, "Unit:")
        .replace(/JARVIS-V4/gi, "Jarvis Version 4")
        .replace(/OPS-01/gi, "Ops 01")
        .trim();
    }

    function speak(msg) {
      if (!voiceEnabled) return;
      if (!("speechSynthesis" in window)) return;

      const text = cleanSpeechText(msg);
      if (!text) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "de-DE";
      utterance.rate = 0.92;
      utterance.pitch = 0.78;
      utterance.volume = 1;

      window.speechSynthesis.speak(utterance);
    }

    function toggleVoice() {
      voiceEnabled = !voiceEnabled;

      const btn = document.getElementById("voiceBtn");
      if (btn) btn.textContent = voiceEnabled ? "Voice On" : "Voice Off";

      if (!voiceEnabled && "speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function ops(msg, delay = 400) {
      typing.style.display = "block";
      setTimeout(() => {
        typing.style.display = "none";
        log(msg, "jarvis");
        speak(msg);
      }, delay);
    }

    function openModule(file) {
      window.location.href = file;
    }

    /* ---------- MEMORY / BACKOFFICE ---------- */
    let mem = {
      lastClient: localStorage.getItem("lastClient") || null,
      lastRate: Number(localStorage.getItem("lastRate")) || 140,
      lastProject: localStorage.getItem("lastProject") || "UNSPECIFIED",
      lastCommand: null
    };

    function updateMem(key, value) {
      if (value !== undefined && value !== null) {
        mem[key] = value;
        localStorage.setItem(key, value);
      }
    }

    function logMission(event, detail = "") {
      let logs = JSON.parse(localStorage.getItem("missionLogs") || "[]");
      logs.push({ event, detail, time: new Date().toISOString() });
      localStorage.setItem("missionLogs", JSON.stringify(logs));
    }

    function addRevenue(amount, client = "UNKNOWN", project = "OPS") {
      let list = JSON.parse(localStorage.getItem("umsatzListe") || "[]");
      list.push({
        amount: Number(amount),
        client,
        project,
        date: new Date().toISOString()
      });
      localStorage.setItem("umsatzListe", JSON.stringify(list));
      logMission("REVENUE_ADDED", `€ ${Number(amount).toFixed(2)} for ${client} · PROJECT: ${project}`);
      updateMem("lastClient", client);

      ops(
        `REVENUE REGISTERED
CLIENT: ${client}
PROJECT: ${project}
AMOUNT: € ${Number(amount).toFixed(2)}`
      );
    }

    function addTimeEntry(hours, project, rate, description) {
      hours = Number(hours) || 0;
      rate = Number(rate) || mem.lastRate || 140;
      project = project || mem.lastProject || "UNSPECIFIED";
      const amount = hours * rate;
      const date = new Date().toISOString().slice(0, 10);

      let list = JSON.parse(localStorage.getItem("timeEntries") || "[]");
      list.push({
        id: "T" + Date.now(),
        date,
        project,
        hours,
        rate,
        amount,
        description: description || "KI-Buchung",
        notes: "",
        created: new Date().toISOString()
      });
      localStorage.setItem("timeEntries", JSON.stringify(list));

      updateMem("lastRate", rate);
      updateMem("lastProject", project);

      logMission(
        "TIME_ENTRY_ADDED",
        `DATE: ${date} · PROJECT: ${project} · HOURS: ${hours.toFixed(2)} · RATE: €${rate.toFixed(2)} · AMOUNT: €${amount.toFixed(2)}`
      );

      ops(
        `TIME ENTRY REGISTERED
DATE: ${date}
PROJECT: ${project}
HOURS: ${hours.toFixed(2)}
RATE: € ${rate.toFixed(2)}
AMOUNT: € ${amount.toFixed(2)}`
      );
    }

    /* ---------- EXECUTION ENGINE (KI-Ausführung) ---------- */
    function executeAction(data) {
      // Debug-Ausgabe im Chat – zeigt dir immer, was vom Backend kommt
      log("DEBUG: " + JSON.stringify(data), "jarvis");

      const intent = data.intent || "fallback_command";
      const params = data.params || {};

      logMission("KI_INTENT_RECEIVED", `Intent: ${intent}, Params: ${JSON.stringify(params)}`);

      switch (intent) {
        case "open_module":
          // Übergabe von Daten an das Kundenanlege-Modul
          if (params.preload_name) localStorage.setItem("tempClientName", params.preload_name);
          if (params.preload_customerNo) localStorage.setItem("tempCustomerNo", params.preload_customerNo);
          if (params.preload_address) localStorage.setItem("tempAddress", params.preload_address);
          if (params.preload_zip) localStorage.setItem("tempZip", params.preload_zip);
          if (params.preload_city) localStorage.setItem("tempCity", params.preload_city);

          // Ansprechpartner + E-Mail + Telefon weiterreichen
          if (params.preload_contact) localStorage.setItem("tempContact", params.preload_contact);
          if (params.preload_email) localStorage.setItem("tempEmail", params.preload_email);
          if (params.preload_phone) localStorage.setItem("tempPhone", params.preload_phone);

          ops(`Opening module: ${params.module}...`);
          setTimeout(() => {
            if (params.module) openModule(params.module);
          }, 400);
          break;

        case "open_big_projects":
          logMission("OPEN_BIG_PROJECTS", "grossprojekte.html");
          ops("Opening BIG PROJECTS board…");
          setTimeout(() => {
            openModule("grossprojekte.html");
          }, 400);
          break;

        case "scan_item":
          localStorage.setItem("inventoryScanMode", "1");
          logMission("SCAN_ITEM", "Scan mode activated, opening lagerbestand.html");
          ops("SCAN-MODUS AKTIVIERT<br>Öffne Lagerbestand – bitte Barcode jetzt mit Scanner einlesen.");
          setTimeout(() => {
            openModule("lagerbestand.html");
          }, 400);
          break;

        case "add_revenue":
          if (params.amount) {
            const amount = Number(params.amount);
            const client = params.client || mem.lastClient || "UNKNOWN";
            const project = params.project || params.project_id || "KI_OPS";
            addRevenue(amount, client, project);
            updateMem("lastClient", client);
          } else {
            ops("KI CORE: Betrag fehlt für Umsatzregistrierung. Bitte Betrag angeben.");
          }
          break;

        case "add_time_entry":
          if (!params.hours) {
            ops("KI CORE: Stundenangabe fehlt. Bitte Stunden angeben.");
          } else {
            const project = params.project || params.project_id || mem.lastProject || "UNSPECIFIED";
            addTimeEntry(params.hours, project, params.rate, params.description);
          }
          break;

        case "create_appointment": {
          const appts = JSON.parse(localStorage.getItem("appointments") || "[]");
          const appt = {
            date: params.date || "",
            time: params.time || "",
            title: params.title || "Termin",
            location: params.location || "",
            notes: params.notes || ""
          };
          appts.push(appt);
          localStorage.setItem("appointments", JSON.stringify(appts));

          logMission(
            "APPOINTMENT_CREATED",
            `TITLE: ${appt.title} · DATE: ${appt.date} ${appt.time} · LOCATION: ${appt.location}`
          );

          ops(
            `APPOINTMENT REGISTERED<br>` +
            `TITLE: ${appt.title}<br>` +
            `DATE/TIME: ${appt.date} ${appt.time}`
          );
          break;
        }

        case "create_dunning": {
          const id = "D" + Date.now();
          const now = new Date().toISOString();

          const mah = {
            id,
            created: now,
            level: params.level || 1,
            client: params.client || "UNBEKANNT",
            invoice_no: params.invoice_no || "",
            amount: Number(params.amount || 0),
            currency: params.currency || "EUR",
            due_date: params.due_date || "",
            days_overdue: params.days_overdue ?? null,
            letter: params.letter || "",
            status: "OFFEN"
          };

          let list = JSON.parse(localStorage.getItem("dunningList") || "[]");
          list.push(mah);
          localStorage.setItem("dunningList", JSON.stringify(list));

          localStorage.setItem("lastDunningId", id);

          logMission(
            "DUNNING_CREATED",
            `CLIENT: ${mah.client} · INVOICE: ${mah.invoice_no || "-"} · LEVEL: ${mah.level} · AMOUNT: ${mah.amount.toFixed(2)} ${mah.currency}`
          );

          ops(
            `DUNNING GENERATED
CLIENT: ${mah.client}
INVOICE: ${mah.invoice_no || "-"}
LEVEL: ${mah.level}
AMOUNT: ${mah.amount.toFixed(2)} ${mah.currency}`
          );

          setTimeout(() => {
            openModule("mahnwesen.html");
          }, 400);

          break;
        }

        case "greeting":
          ops("UNIT JARVIS-V4 ONLINE.\nAwaiting next directive, Commander AICHMAYR.");
          break;

        case "help":
        case "fallback_command":
          ops(`COMMAND NOT RECOGNIZED BY KI CORE. Possible commands:
- Lege Kunde Trafik Steinweg KDN 4711 4050 Traun an
- Umsatz 1500 für Tesla
- Termin 21.11.2025 14:00 Meeting mit Kunde X
- Buche 2 Stunden für ACME zum Satz 140
- Scanne (Lager-Scan-Modus starten)
- Öffne Lager / Rechnungen / Spesen / Dashboard / Zeit / Termine / Großprojekte / Logs / Befehle`);
          break;

        default:
          ops(`UNIT: JARVIS-V4. UNKNOWN INTENT received: ${intent}`);
      }
    }

    /* ---------- Fallback-Parser ---------- */
    function simulateKI(txt) {
      const lowerTxt = txt.toLowerCase().trim();

      // 1) Mahnung erkennen
      if (lowerTxt.includes("mahnung")) {
        const amountMatch = txt.match(/(\d+[.,]?\d*)\s*(euro|€)/i);
        const amount = amountMatch ? Number(amountMatch[1].replace(",", ".")) : null;

        const invMatch = txt.match(/re[-\s]?\d{4}[-\/]?\d+/i);
        const invoice_no = invMatch ? invMatch[0].toUpperCase() : "";

        let client = "UNBEKANNT";
        const cMatch = txt.match(/für\s+(.+?)(\s+über|\s+mit|\s+wegen|\s*$)/i);
        if (cMatch) client = cMatch[1].trim();

        return {
          intent: "create_dunning",
          params: {
            level: 1,
            client,
            invoice_no,
            amount,
            currency: "EUR",
            due_date: "",
            days_overdue: null,
            letter: ""
          }
        };
      }

      // 2) SCAN-MODUS
      if (
        lowerTxt.startsWith("scanne") ||
        lowerTxt.includes("barcode") ||
        lowerTxt.includes("scanner")
      ) {
        return { intent: "scan_item", params: {} };
      }

      // 3) einfache Modul-Opener
      if (lowerTxt.includes("lager")) {
        return { intent: "open_module", params: { module: "lagerbestand.html" } };
      }
      if (lowerTxt.includes("rechnung")) {
        return { intent: "open_module", params: { module: "rechnung.html" } };
      }
      if (lowerTxt.includes("angebot")) {
        return { intent: "open_module", params: { module: "angebot.html" } };
      }
      if (lowerTxt.includes("mahnwesen") || lowerTxt.includes("mahnung")) {
        return { intent: "open_module", params: { module: "mahnwesen.html" } };
      }
      if (lowerTxt.includes("kunde")) {
        return { intent: "open_module", params: { module: "kundenanlegen.html" } };
      }
      if (lowerTxt.includes("umsatz")) {
        return { intent: "open_module", params: { module: "umsatz.html" } };
      }
      if (lowerTxt.includes("spesen")) {
        return { intent: "open_module", params: { module: "spesen.html" } };
      }
      if (lowerTxt.includes("dashboard")) {
        return { intent: "open_module", params: { module: "dashboard.html" } };
      }
      if (lowerTxt.includes("termine")) {
        return { intent: "open_module", params: { module: "termine.html" } };
      }
      if (lowerTxt.includes("zeit")) {
        return { intent: "open_module", params: { module: "zeiterfassung.html" } };
      }

      // Großprojekte
      if (
        lowerTxt.includes("großprojekt") ||
        lowerTxt.includes("grossprojekt") ||
        lowerTxt.includes("projekte")
      ) {
        return { intent: "open_big_projects", params: {} };
      }

      // Logbuch
      if (lowerTxt.includes("logbuch") || lowerTxt.includes("logs")) {
        return { intent: "open_module", params: { module: "logbuch.html" } };
      }

      // Befehle / Commands
      if (
        lowerTxt.includes("befehle") ||
        lowerTxt.includes("befehlsübersicht") ||
        lowerTxt.includes("commands") ||
        lowerTxt.includes("befehl")
      ) {
        return { intent: "open_module", params: { module: "commands.html" } };
      }

      // 4) Zeiterfassung (Fallback)
      if (lowerTxt.startsWith("buche") && (lowerTxt.includes("stunde") || lowerTxt.includes("stunden") || lowerTxt.includes("h "))) {
        let hours = null;
        const hMatch = txt.match(/buche\s+(\d+[.,]?\d*)/i);
        if (hMatch) hours = hMatch[1].replace(",", ".");

        let project = mem.lastProject || "UNSPECIFIED";
        const pMatch = txt.match(/für\s+(.+?)(\s+zum|\s+mit|\s+bei|\s*$)/i);
        if (pMatch) project = pMatch[1].trim();

        let rate = mem.lastRate || 140;
        const rMatch = txt.match(/satz\s+(\d+[.,]?\d*)/i);
        if (rMatch) rate = Number(rMatch[1].replace(",", "."));

        return {
          intent: "add_time_entry",
          params: {
            hours: hours ? Number(hours) : null,
            project,
            rate,
            description: "Fallback-Buchung"
          }
        };
      }

      // 5) Begrüßung / Hilfe
      if (["hallo", "hi", "hey", "servus", "morgen", "moin"].some(k => lowerTxt.startsWith(k))) {
        return { intent: "greeting", params: {} };
      }

      if (lowerTxt === "?" || lowerTxt.includes("hilfe") || lowerTxt.includes("help")) {
        return { intent: "help", params: {} };
      }

      // 6) Fallback
      return { intent: "fallback_command", params: {} };
    }

    /* ---------- SEND / GPT-Call ---------- */
    const BACKEND_URL = "https://api.stratelis.at/api/jarvis";

    async function routeCommand(txt) {
      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text: txt,
            context: mem
          })
        });

        if (!res.ok) {
          throw new Error("Backend error " + res.status);
        }

        return await res.json();
      } catch (e) {
        console.warn("Backend nicht erreichbar, fallback auf simulateKI:", e);
        return simulateKI(txt);
      }
    }

    async function send() {
      const txt = input.value.trim();
      if (!txt) return;

      log(txt, "user");
      input.value = "";
      mem.lastCommand = txt;

      typing.style.display = "block";
      const data = await routeCommand(txt);
      typing.style.display = "none";
      executeAction(data);
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        send();
      }
    });

    /* INITIAL BOOT MESSAGE */
    ops(
      `UNIT: JARVIS-V4
CORE: GPT-LINKED
STATUS: ONLINE
MODE: ULTIMATE
COMMANDER: AICHMAYR
READY FOR NEXT DIRECTIVE`
    );

    setTimeout(() => {
      ops(
        "HINT: z. B. 'Lege Kunde Trafik Steinweg KDN 4711 4050 Traun an', 'Umsatz 1500 für Tesla', 'Termin 21.11.2025 14:00 Meeting mit Kunde X', 'Buche 2 Stunden für ACME zum Satz 140' oder einfach 'Scanne'."
      );
    }, 2000);
  </script>
