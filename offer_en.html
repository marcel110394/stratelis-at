<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">


  <style>
    :root {
      --pad: 14px;
      --border: 1px solid #ccc;
      --maxw: 980px;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f6f7f9;
    }

    header {
      background: #111;
      color: #fff;
      padding: 14px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
    }

    main {
      max-width: var(--maxw);
      margin: 20px auto;
      padding: 0 12px 40px;
    }

    .card {
      background: #fff;
      border: var(--border);
      border-radius: 10px;
      padding: var(--pad);
      box-shadow: 0 2px 6px rgba(0, 0, 0, .04);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
    }

    .col-12 {
      grid-column: span 12;
    }

    .col-6 {
      grid-column: span 6;
    }

    .col-4 {
      grid-column: span 4;
    }

    .col-3 {
      grid-column: span 3;
    }

    label {
      display: block;
      font-size: 12px;
      color: #444;
      margin-bottom: 4px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: var(--border);
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      min-height: 70px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th,
    td {
      border: var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    tfoot td {
      font-weight: 600;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: #111;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin: 14px 0;
      flex-wrap: wrap;
    }

    .preview {
      background: #fff;
      padding: var(--pad);
      border: var(--border);
      border-radius: 10px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 4px;
    }

    @media print {

      header,
      .controls {
        display: none !important;
      }

      body {
        background: #fff;
      }

      main {
        margin: 0;
        padding: 0;
        max-width: 100%;
      }

      .preview {
        border: none;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Aichmayr Technology · Offer Generator</h1>
  </header>

  <main>

    <section class="card controls">
      <div class="grid">

        <div class="col-6">
          <label>Issuer (Name / Company)</label>
          <input id="issuer" value="Marcel Aichmayr · Aichmayr Technology">
        </div>

        <div class="col-6">
          <label>Issuer Address</label>
          <input id="issuerAddr" value="Hammerweg 30, 4050 Traun, Austria">
        </div>

        <div class="col-4">
          <label>IBAN (optional)</label>
          <input id="iban" value="AT89 3400 0000 0619 2504">
        </div>

        <div class="col-4">
          <label>BIC (optional)</label>
          <input id="bic" value="BIC RZOOAT2L">
        </div>

        <div class="col-4">
          <label>Email / Phone</label>
          <input id="contact" value="aichmayr.tech@outlook.com · Phone: +43664 4644439">
        </div>

        <div class="col-6">
          <label>Website</label>
          <input id="web" placeholder="https://aichmayr-technology.com">
        </div>

        <div class="col-6">
          <label>Client / Recipient</label>
          <input id="client" placeholder="Company / Name">
        </div>

        <div class="col-6">
          <label>Client Address</label>
          <input id="clientAddr" placeholder="Street, ZIP City, Country">
        </div>

        <div class="col-3">
          <label>Offer No.</label>
          <input id="offerNo">
        </div>

        <div class="col-3">
          <label>Offer Date</label>
          <input id="date" type="date">
        </div>

        <div class="col-3">
          <label>Valid Until</label>
          <input id="validUntil" type="date">
        </div>

        <div class="col-3">
          <label>Service Period</label>
          <input id="period" placeholder="e.g. 01–03/2026">
        </div>

        <div class="col-6">
          <label>Project / Reference (optional)</label>
          <input id="projectRef" placeholder="e.g. P2025-01 · ACME AI Rollout">
        </div>

        <div class="col-6">
          <label>Scope of Work</label>
          <textarea id="scope"
            placeholder="Short description of the full scope, e.g. workshops, implementation, support..."></textarea>
        </div>

        <div class="col-12">
          <label>Line Items</label>
          <table id="items">
            <thead>
              <tr>
                <th>Description</th>
                <th>Qty</th>
                <th>Unit</th>
                <th>Unit Price (€)</th>
                <th>Net (€)</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="actions">
            <button id="add" type="button">+ Line item</button>
            <button class="secondary" id="clear" type="button">Clear all</button>
          </div>
        </div>

        <div class="col-3">
          <label>VAT rate</label>
          <select id="vat">
            <option value="0" selected>0 % (small business / no VAT)</option>
            <option value="10">10 %</option>
            <option value="20">20 % (AT)</option>
          </select>
        </div>

        <div class="col-3">
          <label>Total discount (%)</label>
          <input id="discount" type="number" value="0" min="0" max="100" step="0.1">
        </div>

        <div class="col-6">
          <label>Footer / Notes</label>
          <textarea id="notes">Small business regulation according to Austrian UStG § 6 (1) no. 27 – no VAT is charged.
This offer is non-binding and valid until the date stated above.</textarea>
        </div>

        <div class="col-12 actions">
          <button type="button" onclick="render()">Update preview</button>
          <button type="button" class="secondary" onclick="window.print()">Save as PDF / Print</button>
        </div>

      </div>
    </section>

    <section class="preview" id="preview"></section>

  </main>

  <script>
    function money(x) {
      return (Math.round(Number(x || 0) * 100) / 100).toFixed(2);
    }

    function slugify(str) {
      return (str || '')
        .toLowerCase()
        .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 40);
    }

    // Init
    (function init() {
      const now = new Date();
      const iso = now.toISOString().slice(0, 10);
      document.getElementById("date").value = iso;

      const valid = new Date(now);
      valid.setDate(valid.getDate() + 30);
      document.getElementById("validUntil").value = valid.toISOString().slice(0, 10);

      document.getElementById("offerNo").value =
        "OFF-" + now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, "0")
        + String(now.getDate()).padStart(2, "0")
        + "-" + String(now.getHours()).padStart(2, "0")
        + String(now.getMinutes()).padStart(2, "0");

      addRow();
    })();

    // Line items
    document.getElementById("add").onclick = addRow;
    document.getElementById("clear").onclick = () => {
      document.querySelector("#items tbody").innerHTML = "";
      addRow();
    };

    function addRow() {
      const tr = document.createElement("tr");
      tr.innerHTML = `
    <td contenteditable="true">AI consulting workshop</td>
    <td contenteditable="true">1</td>
    <td contenteditable="true">day</td>
    <td contenteditable="true">1000.00</td>
    <td class="net">1000.00</td>
    <td><button type="button" onclick="this.closest('tr').remove(); calc()">✕</button></td>`;
      tr.oninput = calc;
      document.querySelector("#items tbody").appendChild(tr);
      calc();
    }

    function calc() {
      let sum = 0;
      document.querySelectorAll("#items tbody tr").forEach(tr => {
        const qty = parseFloat(tr.children[1].textContent.replace(",", ".")) || 0;
        const price = parseFloat(tr.children[3].textContent.replace(",", ".")) || 0;
        const net = qty * price;
        tr.querySelector(".net").textContent = money(net);
        sum += net;
      });
      const disc = parseFloat(document.getElementById("discount").value) || 0;
      const after = sum * (1 - disc / 100);
      const vatRate = parseFloat(document.getElementById("vat").value) || 0;
      const tax = after * vatRate / 100;
      const total = after + tax;
      calc.data = { sum, after, vatRate, tax, total };
    }

    function render() {
      calc();
      const d = calc.data;
      const v = id => document.getElementById(id).value;

      const rows = [...document.querySelectorAll("#items tbody tr")].map(tr => `
    <tr>
      <td>${tr.children[0].textContent}</td>
      <td>${tr.children[1].textContent}</td>
      <td>${tr.children[2].textContent}</td>
      <td style="text-align:right">${tr.children[3].textContent}</td>
      <td style="text-align:right">${tr.children[4].textContent}</td>
    </tr>`).join("");

      const vatText = d.vatRate === 0
        ? "Small business regulation (Austrian UStG § 6 (1) no. 27) – no VAT is charged."
        : d.vatRate + " % VAT.";

      const logo = `<img src="aichmayr-technology-logo.png" alt="Aichmayr Technology Logo"
                     style="height:70px; margin-bottom:10px;">`;

      const clientSlug = slugify(v("client") || v("clientAddr"));
      const dateStr = v("date") || new Date().toISOString().slice(0, 10);
      const folderName = clientSlug ? "clients/" + clientSlug : "clients/UNKNOWN";
      const fileName = "OFFER_" + dateStr + "_" + (clientSlug || "client") + ".pdf";

      document.getElementById("preview").innerHTML = `
    <div style="display:flex; justify-content:space-between; gap:20px;">
      <div>
  ${logo}
  <div style="font-weight:bold; font-size:18px;">${v("issuer")}</div>
  <div>${v("issuerAddr")}</div>
  <div>${v("contact")}</div>
  <div>${v("web")}</div>

  <div style="margin-top:8px; font-size:13px;">
    <b>Bank details:</b><br>
    IBAN: ${v("iban") || "-"}<br>
    BIC: ${v("bic") || "-"}
  </div>
</div>
      <div style="text-align:right;">
        <h2 style="margin:0 0 4px 0;">Offer</h2>
        <div><b>Offer No.:</b> ${v("offerNo")}</div>
        <div><b>Date:</b> ${v("date")}</div>
        <div><b>Valid until:</b> ${v("validUntil")}</div>
        <div><b>Service period:</b> ${v("period") || "-"}</div>
      </div>
    </div>

    <hr>

    <div style="margin:6px 0 10px;">
      <b>To:</b><br>
      ${v("client")}<br>
      ${v("clientAddr")}
    </div>

    <div style="margin:6px 0 14px; font-size:13px;">
      <b>Project / Reference:</b> ${v("projectRef") || "-"}<br>
      <b>Scope of Work:</b><br>
      <div style="white-space:pre-wrap; margin-top:4px;">${v("scope")}</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Qty</th>
          <th>Unit</th>
          <th>Unit Price (€)</th>
          <th>Net (€)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <td colspan="4" style="text-align:right">Subtotal</td>
          <td style="text-align:right">${money(d.sum)}</td>
        </tr>
        <tr>
          <td colspan="4" style="text-align:right">Discount</td>
          <td style="text-align:right">– ${money(d.sum - d.after)}</td>
        </tr>
        <tr>
          <td colspan="4" style="text-align:right">${vatText}</td>
          <td style="text-align:right">${money(d.tax)}</td>
        </tr>
        <tr>
          <td colspan="4" style="text-align:right; font-weight:bold;">Total amount</td>
          <td style="text-align:right; font-weight:bold;">${money(d.total)}</td>
        </tr>
      </tfoot>
    </table>

    <p style="margin-top:20px; white-space:pre-wrap;">${v("notes")}</p>

    <p style="margin-top:10px; font-size:11px; color:#666;">
      This offer was generated electronically and is valid without a handwritten signature.
    </p>


  `;
    }

    // initial preview
    render();
  </script>

</body>

</html>
