<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Angebot · Stratelis</title>
<style>
:root{--bg:#050505;--card:#0e0e0e;--line:rgba(255,255,255,.12);--fg:#fff;--muted:#aaa;--gold:#d6a43a;--green:#00ff77}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 70% 20%,rgba(214,164,58,.13),transparent 30%),var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;min-height:100dvh}
header{padding:22px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:20px;background:#000}
.brand{font-weight:900;letter-spacing:3px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);margin-left:8px}
main{max-width:1100px;margin:0 auto;padding:26px 18px}.hero{padding:30px;border:1px solid var(--line);border-radius:24px;background:rgba(10,10,10,.82);box-shadow:0 20px 60px rgba(0,0,0,.45)}
h1{margin:0 0 12px;font-size:clamp(28px,5vw,54px);letter-spacing:-1px}.lead{color:#d0d0d0;line-height:1.6;max-width:760px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-top:22px}
a.card,button.card{display:block;text-decoration:none;color:#fff;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;text-align:left;cursor:pointer;min-height:92px}
a.card:hover,button.card:hover{border-color:rgba(214,164,58,.55);transform:translateY(-1px)}.card b{display:block;margin-bottom:6px;color:#fff}.card span{color:var(--muted);font-size:13px;line-height:1.4}
.btn{display:inline-block;margin-top:18px;background:linear-gradient(135deg,#9e6b21,#e2b952);color:#050505;text-decoration:none;font-weight:900;padding:12px 18px;border-radius:999px}
input,textarea,select{width:100%;padding:12px;background:#090909;border:1px solid var(--line);border-radius:12px;color:#fff;margin:7px 0 12px}
label{font-size:13px;color:#ccc}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:700px){.row{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}}
table{width:100%;border-collapse:collapse;margin-top:16px;background:#0a0a0a;border-radius:14px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:14px}th{color:#d6a43a}
.small{font-size:12px;color:#888;margin-top:18px}
</style>
</head>
<body>
<header>
  <div><div class="brand">STRATELIS</div><div class="sub">OPS Hub <span class="dot"></span></div></div>
  <div><a class="btn" href="jarvis.html">Jarvis öffnen</a></div>
</header>
<main>
<section class="hero">
<h1>Angebot erstellen</h1>
<p class="lead">Ein einfacher Angebots-Generator. Daten bleiben lokal im Browser, bis wir ihn später an den Server hängen.</p>
<div class="row">
<div><label>Kunde</label><input id="client" placeholder="Kundenname"></div>
<div><label>Angebotsnummer</label><input id="no" placeholder="ANG-2026-001"></div>
</div>
<label>Leistung</label><textarea id="service" rows="4" placeholder="Beschreibung der Leistung"></textarea>
<div class="row">
<div><label>Betrag netto (€)</label><input id="amount" type="number" placeholder="999"></div>
<div><label>Status</label><select id="status"><option>Entwurf</option><option>Gesendet</option><option>Angenommen</option></select></div>
</div>
<button class="card" onclick="saveOffer()"><b>Angebot speichern</b><span>Speichert lokal und zeigt es unten an.</span></button>
<div id="out"></div>
<a class="btn" href="index.html">Zum OPS Hub</a>
</section>
</main>

<script>
function saveOffer(){
 const item={client:client.value,no:no.value||('ANG-'+Date.now()),service:service.value,amount:Number(amount.value||0),status:status.value,date:new Date().toISOString().slice(0,10)};
 const list=JSON.parse(localStorage.getItem('offers')||'[]'); list.push(item); localStorage.setItem('offers',JSON.stringify(list)); render();
}
function render(){
 const list=JSON.parse(localStorage.getItem('offers')||'[]');
 out.innerHTML='<table><tr><th>Datum</th><th>Nr.</th><th>Kunde</th><th>Betrag</th><th>Status</th></tr>'+list.slice().reverse().map(x=>`<tr><td>${x.date}</td><td>${x.no}</td><td>${x.client}</td><td>€ ${x.amount.toFixed(2)}</td><td>${x.status}</td></tr>`).join('')+'</table>';
}
render();
</script>

</body></html>
