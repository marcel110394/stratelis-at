<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Jarvis · Mahnwesen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    main {
      padding: 12px 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h2 {
      margin: 6px 0 4px;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .info {
      font-size: 11px;
      color: #aaa;
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      padding: 10px 12px;
      background: #050505;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: #080808;
      color: #fff;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
    }

    .meta {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 6px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    button {
      padding: 7px 11px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #fff;
      color: #000;
    }

    .btn-secondary {
      background: #111;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .list {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      max-height: 260px;
      overflow-y: auto;
      background: #050505;
    }

    .entry {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .entry:last-child {
      border-bottom: none;
    }

    .entry-main {
      max-width: 70%;
    }

    .entry-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .entry-meta {
      color: #bbb;
    }

    .pill {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      margin-left: 4px;
    }

    /* Stufen-Farben */
    .pill-l1 {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
    }

    .pill-l2 {
      border-color: #facc15;
      background: rgba(250, 204, 21, 0.12);
      color: #fef9c3;
    }

    .fee-note {
      color: #f97373;
      font-weight: 600;
      font-size: 10px;
      margin-left: 4px;
    }

    .empty {
      font-size: 12px;
      color: #777;
      padding: 8px 10px;
    }
  </style>
</head>

<body>
  <header>
    <div>Mahnung · Aichmayr OPS</div>
    <button class="btn-ghost" onclick="location.href='jarvis.html'">JARVIS Home</button>
  </header>

  <main>
    <section class="card">
      <h2>Letzte erzeugte Mahnung</h2>
      <div class="info">Von Jarvis erzeugt über Sprachbefehl. Text kann hier angepasst und kopiert werden.</div>
      <div id="last-meta" class="meta">Keine Mahnung vorhanden.</div>
      <textarea id="last-letter" placeholder="Noch kein Mahntext vorhanden."></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="copyLast()">Text kopieren</button>
        <button class="btn-secondary" onclick="saveEdit()">Änderungen speichern</button>
      </div>
    </section>

    <section>
      <h2>Alle Mahnungen</h2>
      <div class="info">Liste aller von Jarvis erzeugten Mahnungen (lokal gespeichert).</div>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script>
    function getList() {
      return JSON.parse(localStorage.getItem("dunningList") || "[]");
    }
    function saveList(list) {
      localStorage.setItem("dunningList", JSON.stringify(list));
    }

    const lastMetaEl = document.getElementById("last-meta");
    const lastLetterEl = document.getElementById("last-letter");
    const listEl = document.getElementById("list");

    let lastId = localStorage.getItem("lastDunningId") || null;
    let data = getList();

    function renderLast() {
      data = getList();
      if (!data.length) {
        lastMetaEl.textContent = "Keine Mahnung vorhanden.";
        lastLetterEl.value = "";
        return;
      }
      let m = data.find(d => d.id === lastId) || data[data.length - 1];
      if (m) lastId = m.id;

      const level = m.level || 1;
      const pillClass = level === 1 ? "pill pill-l1" : "pill pill-l2";

      const baseAmount = m.amount || 0;
      const fee = level >= 2 ? 20 : 0;
      const displayAmount = (baseAmount + fee).toFixed(2);
      const feeText = level >= 2
        ? ' <span class="fee-note">inkl. 20,00 € Bearbeitungsgebühr (Mahnstufe 2)</span>'
        : '';

      lastMetaEl.innerHTML =
        `<span class="${pillClass}">Level ${level}</span> · ` +
        `CLIENT: ${m.client || "UNBEKANNT"} · ` +
        `INV: ${m.invoice_no || "-"} · ` +
        `AMOUNT: ${displayAmount} ${m.currency || "EUR"}${feeText} · ` +
        `DUE: ${m.due_date || "-"} · STATUS: ${m.status || "OFFEN"}`;

      lastLetterEl.value = m.letter || "";
    }

    function renderList() {
      data = getList();
      if (!data.length) {
        listEl.innerHTML = '<div class="empty">Noch keine Mahnungen erzeugt.</div>';
        return;
      }
      listEl.innerHTML = "";
      data
        .slice()
        .sort((a, b) => (b.created || "").localeCompare(a.created || ""))
        .forEach(m => {
          const div = document.createElement("div");
          div.className = "entry";
          div.onclick = () => select(m.id);

          const level = m.level || 1;
          const pillClass = level === 1 ? "pill pill-l1" : "pill pill-l2";

          const baseAmount = m.amount || 0;
          const fee = level >= 2 ? 20 : 0;
          const displayAmount = (baseAmount + fee).toFixed(2);
          const feeText = level >= 2
            ? ' <span class="fee-note">+ 20,00 € Bearbeitungsgebühr</span>'
            : '';

          div.innerHTML = `
        <div class="entry-main">
          <div class="entry-title">
            ${m.client || "UNBEKANNT"}
            <span class="${pillClass}">Level ${level}</span>
          </div>
          <div class="entry-meta">
            INV: ${m.invoice_no || "-"} · 
            AMOUNT: ${displayAmount} ${m.currency || "EUR"}${feeText}<br>
            DUE: ${m.due_date || "-"} · STATUS: ${m.status || "OFFEN"}
          </div>
        </div>
        <div style="font-size:11px; color:#aaa;">
          ${(m.created || "").slice(0, 10)}
        </div>
      `;
          listEl.appendChild(div);
        });
    }

    function select(id) {
      lastId = id;
      localStorage.setItem("lastDunningId", id);
      renderLast();
      renderList();
    }

    function copyLast() {
      const txt = lastLetterEl.value;
      if (!txt) return;
      navigator.clipboard?.writeText(txt).catch(() => { });
      // Info leicht aktualisieren
      lastMetaEl.innerHTML = lastMetaEl.innerHTML + ' · <span class="fee-note">Text kopiert</span>';
    }

    function saveEdit() {
      if (!lastId) return;
      data = getList();
      const idx = data.findIndex(m => m.id === lastId);
      if (idx === -1) return;
      data[idx].letter = lastLetterEl.value;
      saveList(data);
      lastMetaEl.innerHTML = lastMetaEl.innerHTML + ' · <span class="fee-note">Änderungen gespeichert</span>';
    }

    renderList();
    renderLast();
  </script>
</body>

</html>
